<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZYN - شاهد الإعلان واربح</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a0533 0%, #0d1b2a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 40px 30px;
            max-width: 380px;
            width: 100%;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        .logo { font-size: 56px; margin-bottom: 16px; }
        h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; color: #c084fc; }
        p { font-size: 14px; color: #94a3b8; margin-bottom: 28px; line-height: 1.6; }
        .reward-badge {
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            border-radius: 50px;
            padding: 10px 24px;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 28px;
            display: inline-block;
        }
        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        #watchBtn {
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            color: white;
            margin-bottom: 12px;
        }
        #watchBtn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(124,58,237,0.4); }
        #watchBtn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            display: none;
        }
        .status.success { background: rgba(34,197,94,0.2); color: #4ade80; display: block; }
        .status.error { background: rgba(239,68,68,0.2); color: #f87171; display: block; }
        .loading { display: none; margin-top: 16px; }
        .spinner {
            width: 32px; height: 32px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: #7c3aed;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">📺</div>
        <h1>اربح ZYN إضافية!</h1>
        <p>شاهد إعلاناً قصيراً واحصل على مكافأة فورية في محفظتك</p>
        <div class="reward-badge">🎁 +2 ZYN</div>
        <button id="watchBtn" onclick="watchAd()">▶️ ابدأ مشاهدة الإعلان</button>
        <div class="loading" id="loading"><div class="spinner"></div></div>
        <div class="status" id="status"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const BLOCK_ID = 25737;
        let AdController;

        async function initAd() {
            try {
                AdController = await window.Adsgram.init({ blockId: String(BLOCK_ID) });
            } catch (e) {
                console.error('Adsgram init error:', e);
            }
        }

        async function watchAd() {
            const btn = document.getElementById('watchBtn');
            const loading = document.getElementById('loading');
            const status = document.getElementById('status');

            btn.disabled = true;
            loading.style.display = 'block';
            status.className = 'status';

            try {
                if (!AdController) {
                    AdController = await window.Adsgram.init({ blockId: String(BLOCK_ID) });
                }

                const result = await AdController.show();

                if (result.done) {
                    // إرسال إشارة نجاح للبوت
                    tg.sendData(JSON.stringify({ action: 'ad_watched', status: 'done' }));
                    status.className = 'status success';
                    status.textContent = '✅ تم بنجاح! سيتم إرسال 2 ZYN لمحفظتك الآن...';
                    btn.style.display = 'none';
                    setTimeout(() => tg.close(), 2000);
                }
            } catch (err) {
                loading.style.display = 'none';
                btn.disabled = false;

                if (err.error) {
                    status.className = 'status error';
                    status.textContent = '❌ حدث خطأ. حاول مرة أخرى لاحقاً.';
                } else {
                    // لو الإعلان لم يُكمل (المستخدم أغلق قبل النهاية)
                    status.className = 'status error';
                    status.textContent = '⚠️ يجب مشاهدة الإعلان حتى النهاية للحصول على المكافأة.';
                }
            }
            loading.style.display = 'none';
        }

        initAd();
    </script>
</body>
</html>
